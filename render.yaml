services:
  - type: web
    name: getsiaq-online
    runtime: python
    plan: starter
    region: frankfurt
    healthCheckPath: /
    domains:
      - getsiaq.online
      - www.getsiaq.online
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && python manage.py boost_palm_landscape_seo && gunicorn project.wsgi:application --workers 2 --threads 4 --timeout 120 --log-file -"
    disk:
      name: getsiaq-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_PRODUCTION
        value: "True"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "getsiaq.online,www.getsiaq.online"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://getsiaq.online,https://www.getsiaq.online"
      - key: SITE_DOMAIN
        value: "getsiaq.online"
      - key: WWW_SITE_DOMAIN
        value: "www.getsiaq.online"
      - key: SITE_URL
        value: "https://getsiaq.online"
      - key: SQLITE_NAME
        value: "/var/data/db.sqlite3"
      - key: MEDIA_ROOT
        value: "/var/data/media"
      - key: STATIC_ROOT
        value: "staticfiles_build"
      - key: USE_CLOUDINARY_MEDIA
        value: "False"
      - key: WHITENOISE_MANIFEST_STRICT
        value: "False"
      - key: DJANGO_ENABLE_HTTPS_SECURITY
        value: "True"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "True"
      - key: OPENAI_MODEL
        value: "gpt-4.1"
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_DAILY_SEO_ENABLED
        value: "False"
