<div class="ai-field{% if wide %} ai-field-wide{% endif %}{% if compact %} ai-field-compact{% endif %}">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
    <p class="help">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
    <div class="errors">{{ field.errors }}</div>
    {% endif %}
</div>
