name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: 'False'
      DJANGO_ALLOWED_HOSTS: 'getsiaq.online,www.getsiaq.online,testserver'
      DJANGO_CSRF_TRUSTED_ORIGINS: 'https://getsiaq.online,https://www.getsiaq.online'
      SITE_DOMAIN: 'getsiaq.online'
      WWW_SITE_DOMAIN: 'www.getsiaq.online'
      SITE_URL: 'https://getsiaq.online'
      DJANGO_SECRET_KEY: 'ci-secret-for-getsiaq-online'
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Django checks
      run: |
        python manage.py check
    - name: Validate sitemap and robots endpoints
      run: |
        python - <<'PY'
from django.test import Client
import os
os.environ['DJANGO_SETTINGS_MODULE']='project.settings'
from django import setup
setup()
client = Client()
r = client.get('/robots.txt', HTTP_HOST='getsiaq.online')
print('robots:', r.status_code)
assert r.status_code in (200, 301, 302)
r2 = client.get('/sitemap.xml', HTTP_HOST='getsiaq.online')
print('sitemap:', r2.status_code)
assert r2.status_code in (200, 301, 302)
PY
